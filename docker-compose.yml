services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dragonfly
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: Dragonfly
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: waitasecondyoutriedadmin?
    volumes:
      - ./voice-realm.json:/opt/keycloak/data/import/voice-realm.json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  fastapi:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:Dragonfly@postgres:5432/v_expose
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: Voice
    volumes:
      - ./src:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: